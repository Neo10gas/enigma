<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Enigma Hacker</title>

<style>

body{
    margin:0;
    padding:0;
    background:black;
    color:#00ff66;
    font-family:Courier New, monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.container{
    text-align:center;
    width:90%;
    z-index:2;
}

h1{
    font-size:42px;
    text-shadow:0 0 15px #00ff66;
}

#encrypted{
    margin-top:30px;
    font-size:22px;
    letter-spacing:2px;
    animation:flicker 1.5s infinite;
}

p{
    margin-top:40px;
    font-size:20px;
}

input{
    background:black;
    border:2px solid #00ff66;
    color:#00ff66;
    padding:12px;
    width:140px;
    text-align:center;
    font-size:22px;
}

button{
    margin-top:20px;
    padding:12px 25px;
    background:black;
    color:#00ff66;
    border:2px solid #00ff66;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#00ff66;
    color:black;
}

#result{
    margin-top:35px;
    font-size:28px;
    text-shadow:0 0 10px #00ff66;
}

@keyframes flicker{
    0%{opacity:1;}
    50%{opacity:0.6;}
    100%{opacity:1;}
}

canvas{
    position:absolute;
    top:0;
    left:0;
    z-index:1;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1>=== SISTEMA DI DECRIPTAZIONE ===</h1>

<div id="encrypted">
LO VHFRQGR LQGLCLR VL WURYD GLHWUR GL YRL
</div>

<p>
Inserisci il giorno di nascita del prof Di Stasio
</p>

<input type="number" id="code" placeholder="???">

<br>

<button onclick="decrypt()">
DECRIPTA
</button>

<div id="result"></div>

<br><br>

<button onclick="startMusic()">
AVVIA AUDIO
</button>

</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8d87fdbf4.mp3?filename=beautiful-piano-113997.mp3" type="audio/mpeg">
</audio>

<script>

function decrypt(){

    let code=document.getElementById("code").value;
    let result=document.getElementById("result");

    if(code==10){

        result.innerHTML="DECRIPTAZIONE IN CORSO...";

        setTimeout(function(){

            result.innerHTML="<strong>IL SECONDO INDIZIO SI TROVA DIETRO DI VOI</strong>";

        },2500);

    }else{

        result.innerHTML="ACCESSO NEGATO - RITENTA";

    }
}

function startMusic(){
    document.getElementById("music").play();
}

/* MATRIX EFFECT */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01";
const fontSize=14;
const columns=canvas.width/fontSize;

const drops=[];

for(let x=0;x<columns;x++){
    drops[x]=1;
}

function draw(){

    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#00ff66";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){

        const text=letters.charAt(Math.floor(Math.random()*letters.length));

        ctx.fillText(text,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
            drops[i]=0;
        }

        drops[i]++;
    }
}

setInterval(draw,33);

</script>

</body>
</html>

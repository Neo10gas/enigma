<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema di Decriptazione</title>

<style>

body{
    background:black;
    color:#00ff66;
    font-family:Courier New, monospace;
    text-align:center;
    padding-top:80px;
    margin:0;
}

h1{
    text-shadow:0 0 10px #00ff66;
}

#encrypted{
    font-size:26px;
    margin-top:30px;
    margin-bottom:30px;
    letter-spacing:2px;
}

#hint{
    margin-top:20px;
    font-size:18px;
}

input{
    background:black;
    color:#00ff66;
    border:2px solid #00ff66;
    padding:10px;
    font-size:22px;
    width:120px;
    text-align:center;
}

button{
    background:black;
    color:#00ff66;
    border:2px solid #00ff66;
    padding:10px 20px;
    margin-top:20px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#00ff66;
    color:black;
}

#result{
    margin-top:30px;
    font-size:28px;
    text-shadow:0 0 10px #00ff66;
}

</style>
</head>

<body>

<h1>=== SISTEMA DI DECRIPTAZIONE ===</h1>

<p style="font-size:18px;">
"La legenda è scritta, ha effetto la tinta...
utilizza la luce di Wood per scoprire."
</p>

<div id="encrypted">
LO VHFRQGR LQGLCLR VL WURYD GLHWUR GL YRL
</div>

<p id="hint">
Inserisci un numero da 0 a 99 per decriptare
</p>

<input
    type="number"
    id="code"
    min="0"
    max="99"
    placeholder="0-99">

<br>

<button onclick="decrypt()">
DECRIPTA
</button>

<div id="result"></div>

<script>

let tentativi = 0;

function decrypt() {

    let code = document.getElementById("code").value;
    let result = document.getElementById("result");
    let hint = document.getElementById("hint");

    tentativi++;

    if(code == 10){

        result.innerHTML = "DECRIPTAZIONE IN CORSO...";

        setTimeout(function(){

            result.innerHTML =
            "<strong>IL SECONDO INDIZIO SI TROVA DIETRO DI VOI</strong>";

        }, 2500);

    } else {

        result.innerHTML =
        "ACCESSO NEGATO - RITENTA";

        if(tentativi >= 2){

            hint.innerHTML =
            "Inserisci il giorno di nascita del professore Di Stasio per decriptare";

        }

    }

}

</script>

</body>
</html>
